 version: "3.8"
 services:
   mnemo:
     build: .
     ports:
       - "8000:8000"
     env_file: .env
     depends_on:
       - redis
       - qdrant
     volumes:
       - ./mnemo.db:/app/mnemo.db
 
   redis:
     image: redis:7-alpine
     ports:
       - "6379:6379"
       
   qdrant:
      image: qdrant/qdrant
      ports:
        - "6333:6333"
      volumes:
        - qdrant_data:/qdrant/storage

   worker:
    environment:
    - PYTHONUNBUFFERED=1
    build: .
    command: arq mnemo.app.workers.extraction_worker.WorkerSettings
    ports:
      - "8001:8001"
    env_file: .env
    depends_on:
      - redis
      - qdrant
    volumes:
      - ./mnemo.db:/app/mnemo.db

 volumes:
  qdrant_data:
